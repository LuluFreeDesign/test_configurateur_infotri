<!DOCTYPE html>
<html lang="fr" data-fr-theme>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block page_title %}Configurateur Info-tri{% endblock %}</title>
    <meta name="description" content="{% block page_description %}Générateur d'Info-tri réglementaire{% endblock %}">
    <link rel="stylesheet" href="https://unpkg.com/@gouvfr/dsfr@1.11.2/dist/dsfr.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@gouvfr/dsfr@1.11.2/dist/utility/utility.min.css">
    <script>
      /* Tailwind Play CDN avec le préfixe qf- utilisé dans ce projet */
      tailwind = { config: { prefix: 'qf-' } }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="{% block body_classes %}{% endblock %}">

{% block content %}{% endblock %}

<script src="https://unpkg.com/@gouvfr/dsfr@1.11.2/dist/dsfr.module.min.js" type="module"></script>
<script src="https://unpkg.com/@hotwired/turbo@7.3.0/dist/turbo.es2017.esm.js" type="module"></script>
{% block js %}{% endblock %}

</body>
</html>
